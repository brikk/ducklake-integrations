[versions]
kotlin = "2.3.10"
adbc = "0.21.0"
duckdb = "1.5.4.0"
quack-jdbc = "0.2.0-alpha.4"
arrow = "18.3.0"
terpal-sql-plugin = "2.3.0-2.0.1.PL"
terpal-sql-lib = "2.0.0.PL-4.4.0"
jackson = "2.21.2"
java-uuid-generator = "5.0.0"
junit = "5.12.2"
assertj = "3.27.3"
trino = "483"
# Published DuckLake catalog + corpus-replay coordinates (dev.brikk.ducklake). Bump in lockstep
# when consuming a new catalog release; -SNAPSHOT resolves from the Central Portal snapshots repo.
ducklake-catalog = "0.0.1"
postgres = "42.7.8"
mysql = "9.7.0"
minio = "8.6.0"
hikari = "7.0.2"
containers = "2.0.5"
jooq = "3.19.22"
roaring-bitmap = "1.3.0"
detekt = "2.0.0-alpha.3"
# Route B (lance-core JNI) — benchmark-only test dependency; the RESEARCH-verified version.
lance-core = "6.0.0"
# brikk-sql: TEST-ONLY SQL transpiler (corpus-replay dialect gate). Releases (e.g. 0.2.0) are on
# Maven Central; -SNAPSHOTs live in the Central Portal snapshots repo (wired in the
# buildlogic.kotlin.brikk convention). Flip this ONE value between a release and a -SNAPSHOT.
# On 0.3.0-SNAPSHOT pending release: adds Finding.areas + TranspileReport.okAccepting {} and tiers
# the DATE+INTERVAL hazard (provably-DATE→REFUSAL, bare-column→WARNING). See the gate policy in
# TrinoCorpusDialect + the 0.3.0 migration note in dev-docs/NOTE-transpile-first-corpus-gate.md.
brikk-sql = "0.3.0-SNAPSHOT"

[libraries]
kotlin-bom = { module = "org.jetbrains.kotlin:kotlin-bom", version.ref = "kotlin" }

arrow-bom = { module = "org.apache.arrow:arrow-bom", version.ref = "arrow" }
arrow-memory-core = { module = "org.apache.arrow:arrow-memory-core" }
arrow-memory-netty = { module = "org.apache.arrow:arrow-memory-netty" }
arrow-vector = { module = "org.apache.arrow:arrow-vector" }
arrow-data = { module = "org.apache.arrow:arrow-c-data" }
arrow-dataset = { module = "org.apache.arrow:arrow-dataset"  }
arrow-flight-jdbc = { module = "org.apache.arrow:flight-sql-jdbc-driver" }
arrow-flight-sql = { module = "org.apache.arrow:flight-sql" }
arrow-jdbc-adapter = { module = "org.apache.arrow:arrow-jdbc" }

adbc-core = { module = "org.apache.arrow.adbc:adbc-core", version.ref = "adbc" }
adbc-mgr = { module = "org.apache.arrow.adbc:adbc-driver-manager", version.ref = "adbc" }
adbc-jni = { module = "org.apache.arrow.adbc:adbc-driver-jni", version.ref = "adbc" }

hikari = { module = "com.zaxxer:HikariCP", version.ref = "hikari" }
duckdb-jdbc = { module = "org.duckdb:duckdb_jdbc", version.ref = "duckdb" }
quack-jdbc = { module = "com.gizmodata:quack-jdbc", version.ref = "quack-jdbc" }
lance-core = { module = "org.lance:lance-core", version.ref = "lance-core" }
trino-jdbc = { module = "io.trino:trino-jdbc", version.ref = "trino" }
trino-bom = { module = "io.trino:trino-root", version.ref = "trino" }
postgres-jdbc = { module = "org.postgresql:postgresql", version.ref = "postgres" }

# Published DuckLake catalog artifacts (from dev.brikk.ducklake:ducklake-catalog repo).
ducklake-catalog = { module = "dev.brikk.ducklake:ducklake-catalog", version.ref = "ducklake-catalog" }
ducklake-test-corpus-replay = { module = "dev.brikk.ducklake:ducklake-test-corpus-replay", version.ref = "ducklake-catalog" }
mysql-jdbc = { module = "com.mysql:mysql-connector-j", version.ref = "mysql" }

testcontainers-core = { module = "org.testcontainers:testcontainers", version.ref = "containers" }
testcontainers-postgresql = { module = "org.testcontainers:testcontainers-postgresql", version.ref = "containers" }
testcontainers-mysql = { module = "org.testcontainers:testcontainers-mysql", version.ref = "containers" }

jackson-databind = { module = "com.fasterxml.jackson.core:jackson-databind", version.ref = "jackson" }
jackson-jdk8 = { module = "com.fasterxml.jackson.datatype:jackson-datatype-jdk8", version.ref = "jackson" }
java-uuid-generator = { module = "com.fasterxml.uuid:java-uuid-generator", version.ref = "java-uuid-generator" }

junit-bom = { module = "org.junit:junit-bom", version.ref = "junit" }
junit-jupiter-api = { module = "org.junit.jupiter:junit-jupiter-api" }
junit-jupiter-engine = { module = "org.junit.jupiter:junit-jupiter-engine" }
junit-platform-launcher = { module = "org.junit.platform:junit-platform-launcher" }
assertj-core = { module = "org.assertj:assertj-core", version.ref = "assertj" }

minio-client = { module = "io.minio:minio", version.ref = "minio" }

terpal-sql-lib = { module = "io.exoquery:terpal-sql-jdbc", version.ref = "terpal-sql-lib"}

kotlin-test-junit = { module = "org.jetbrains.kotlin:kotlin-test-junit", version.ref = "kotlin" }

roaring-bitmap = { module = "org.roaringbitmap:RoaringBitmap", version.ref = "roaring-bitmap" }

jooq-core = { module = "org.jooq:jooq", version.ref = "jooq" }
jooq-kotlin = { module = "org.jooq:jooq-kotlin", version.ref = "jooq" }
jooq-codegen = { module = "org.jooq:jooq-codegen", version.ref = "jooq" }
jooq-meta = { module = "org.jooq:jooq-meta-extensions", version.ref = "jooq" }

# brikk-sql (dev.brikk.house) — TEST-ONLY. KMP JVM artifacts; see buildlogic.kotlin.brikk.
brikk-sql = { module = "dev.brikk.house:brikk-sql-jvm", version.ref = "brikk-sql" }
brikk-sql-metadata = { module = "dev.brikk.house:brikk-sql-metadata-jvm", version.ref = "brikk-sql" }
brikk-sql-verify = { module = "dev.brikk.house:brikk-sql-verify", version.ref = "brikk-sql" }

[bundles]
jooq = [
    "jooq-core",
    "jooq-kotlin",
]

[plugins]
kotlin-jvm = { id = "org.jetbrains.kotlin.jvm", version.ref = "kotlin" }
kotlin-multiplatform = { id = "org.jetbrains.kotlin.multiplatform", version.ref = "kotlin" }
kotlin-plugin-serialization = { id = "org.jetbrains.kotlin.plugin.serialization", version.ref = "kotlin" }
terpal-sql = { id = "io.exoquery.terpal-plugin", version.ref = "terpal-sql-plugin" }
jooq = { id = "org.jooq.jooq-codegen-gradle", version.ref = "jooq" }
detekt = { id = "dev.detekt", version.ref = "detekt" }
