# CI for brikk/ducklake-integrations (the Trino DuckLake connector).
#
# Scope: this is now a single-project Gradle build at the repo ROOT (wrapper at ./gradlew,
# settings at ./settings.gradle.kts). The shared catalog + corpus-replay moved to
# github.com/brikk/ducklake-catalog and are consumed as published dev.brikk.ducklake
# artifacts (Maven Central / snapshots). The Doris connector moved to
# github.com/brikk/doris-ducklake. Neither is built here anymore.
#
# NOTE: the DuckDB `trino_parity` extension and the duckdb/vortex/lance data-file formats
# were moved OUT of this repo (to github.com/brikk/duckbridge). trino-ducklake no longer
# builds or bundles that extension, so this workflow no longer builds it either.

name: CI

on:
  # PRs are the gate for feature branches (runs on any PR).
  pull_request:
  # Pushes to main run post-merge validation AND populate the Actions cache. GitHub scopes
  # caches per-branch: entries created on the DEFAULT branch (main) are readable by ALL
  # branches, but a feature branch's cache is NOT visible to main or to siblings — so building
  # on main seeds the Gradle cache that every PR/feature branch then restores.
  push:
    branches: [main]

# Cancel superseded runs on the same ref to save runner minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    # detekt + the full test suite (incl. Testcontainers PostgreSQL and the corpus
    # replay starter set) fit comfortably on the default runner.
    timeout-minutes: 60
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v7
        with:
          # submodules are required:
          #   - ducklake (duckdb/ducklake): the sqllogictest corpus fixture the replay
          #     tests read from (ducklake.corpus.root -> ducklake/test/sql).
          #   - ducklake-web (duckdb/ducklake-web).
          submodules: recursive

      - name: Set up JDK 25 (Temurin)
        uses: actions/setup-java@v5
        with:
          # Java 25 is mandatory: mise.toml pins java = "25" and the build sets
          # jvmToolchain(25) in build-logic. The Gradle daemon (which also runs detekt)
          # must be a JDK 25 — Java 21 fails configuration. Temurin 25 is GA.
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle (with caching)
        # gradle/actions/setup-gradle handles Gradle user-home caching (dependencies,
        # wrapper dist) and reads the wrapper version from gradle/wrapper.
        uses: gradle/actions/setup-gradle@v6

      # detekt and tests are split into two invocations ON PURPOSE. detekt runs in the
      # Gradle daemon (heap bumped in gradle.properties for cold-cache dependency
      # resolution); tests fork their own 3 GB JVM. Running them together lets the two
      # heavy phases peak simultaneously, which risks OOM on a 2-core/7 GB runner.
      # Sequential steps bound peak memory and give clean failure attribution.
      - name: detekt (quality gate)
        run: ./gradlew detekt --stacktrace

      - name: tests
        # `test` includes dev.brikk.ducklake.trino.plugin.TestTrinoCorpusReplay. We do NOT
        # pass -Dducklake.corpus.dirs here, so it runs only its default starter set
        # (general,catalog,time_travel,view) to keep PR runtime bounded. The FULL corpus
        # (-Dducklake.corpus.dirs=all) runs in corpus-nightly.yml.
        # (Beware: the leading `d` matters. `-Dducklake.corpus.dirs=all` is correct;
        #  `-Ducklake.corpus.dirs=all` is parsed by the JVM as `-D ucklake...` and
        #  silently falls back to the starter set.)
        #
        # Docker + network dependency: tests use Testcontainers for PostgreSQL (Docker is
        # preinstalled on ubuntu-latest) and download DuckDB extensions at test time
        # (INSTALL ducklake/postgres). On a fully air-gapped runner these self-skip via
        # JUnit assumeTrue; ubuntu-latest has outbound network, so they execute. No secrets
        # or external services are required.
        #
        # -PexcludeTags=ci-unstable skips one orphan-dataset-dir cleanup test that passes
        # locally but not on the CI filesystem (cause not yet reproduced; tracked in
        # dev-docs/TODO-WRITE-MODE.md). Everything else runs.
        run: ./gradlew test -PexcludeTags=ci-unstable --stacktrace

      - name: Upload test & detekt reports
        # Only on failure — the reports are the useful artifact when something breaks.
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: build-and-test-reports
          path: |
            build/reports
            build/test-results
          if-no-files-found: ignore
          retention-days: 14
