name: trino-ducklake-dev

services:
  postgres:
    image: postgres:${POSTGRES_VERSION}
    container_name: trino-ducklake-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "9432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 2s
      timeout: 5s
      retries: 30

  minio:
    image: minio/minio:${MINIO_TAG}
    container_name: trino-ducklake-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 2s
      timeout: 5s
      retries: 30

  create-bucket:
    image: minio/mc:${MC_TAG}
    container_name: trino-ducklake-create-bucket
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD} &&
        mc mb --ignore-existing local/${MINIO_BUCKET} &&
        echo 'bucket ${MINIO_BUCKET} ready'
      "
    restart: "no"

  bootstrap:
    image: python:3.12-slim
    container_name: trino-ducklake-bootstrap
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      create-bucket:
        condition: service_completed_successfully
    environment:
      PG_HOST: postgres
      PG_PORT: "5432"
      PG_DB: ${POSTGRES_DB}
      PG_USER: ${POSTGRES_USER}
      PG_PASSWORD: ${POSTGRES_PASSWORD}
      S3_ENDPOINT: minio:9000
      S3_KEY_ID: ${MINIO_ROOT_USER}
      S3_SECRET: ${MINIO_ROOT_PASSWORD}
      S3_BUCKET: ${MINIO_BUCKET}
      S3_DATA_PREFIX: data/
      DUCKDB_VERSION: ${DUCKDB_VERSION}
      TPCH_SCALE_FACTOR: ${TPCH_SCALE_FACTOR}
      TPCH_SCHEMA: ${TPCH_SCHEMA}
    volumes:
      - ./bootstrap:/bootstrap:ro
    command:
      - /bin/sh
      - -c
      - |
        set -e
        pip install --quiet --no-cache-dir "duckdb==${DUCKDB_VERSION}"
        exec python /bootstrap/init_ducklake.py
    restart: "no"

  duckqk:
    build:
      context: ../../ducklake-catalog/testFixtures/resources/docker/quack-server
      dockerfile: Dockerfile
    container_name: trino-ducklake-duckqk
    depends_on:
      bootstrap:
        condition: service_completed_successfully
    environment:
      QUACK_PORT: "9494"
      QUACK_TOKEN: ${QUACK_TOKEN:-ducklake-engine-token}
      # Lance s3 credential channel (HANDOFF O1): the DuckDB lance extension's Rust
      # object_store ignores DuckDB httpfs secrets and reads these process-global
      # AWS_* env vars instead. Set at container launch, inherited by the duckdb
      # process — keep in sync with DuckDbS3Config.toObjectStoreEnv()'s mapping of
      # the catalog's s3.* properties. Harmless for non-lance reads.
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      AWS_REGION: us-east-1
      AWS_ENDPOINT: http://minio:9000
      AWS_ENDPOINT_URL: http://minio:9000
      AWS_ALLOW_HTTP: "true"
    volumes:
      # Shared with trino at the same path so materialize-mode .db files
      # written by the Trino worker are visible to server-side ATTACH.
      - ducklake-materialize:/tmp/ducklake-read
      # trino_parity extension binary, same as the trino container — Quack
      # server-side LOAD '<path>' is sent through the wrapper by the
      # QuackDuckDbExecutor when the catalog has ducklake.duckdb.parity-extension-path
      # set. Identical in-container path on both sides keeps quack.properties
      # and ducklake.properties consistent. Server-side LOAD requires
      # allow_unsigned_extensions, set via `duckdb -unsigned` in entrypoint.sh.
      - ../../../duckdb-trino-parity-extension/build/release/extension/trino_parity/trino_parity.duckdb_extension:/opt/duckdb-extensions/trino_parity.duckdb_extension:ro
    restart: unless-stopped

  trino:
    image: trinodb/trino:${TRINO_VERSION}
    container_name: trino-ducklake-trino
    depends_on:
      bootstrap:
        condition: service_completed_successfully
      duckqk:
        condition: service_started
    ports:
      - "9080:8080"
    mem_limit: 4g
    environment:
      JAVA_TOOL_OPTIONS: >-
        --add-opens=java.base/java.nio=ALL-UNNAMED
        --add-opens=java.base/java.lang=ALL-UNNAMED
    volumes:
      - ./trino/etc/catalog/ducklake.properties:/etc/trino/catalog/ducklake.properties:ro
      - ./trino/etc/catalog/ducklake_ovh.properties:/etc/trino/catalog/ducklake_ovh.properties:ro
      - ./trino/etc/catalog/quack.properties:/etc/trino/catalog/quack.properties:ro
      - ./trino/etc/catalog/quack_ovh.properties:/etc/trino/catalog/quack_ovh.properties:ro
      - ../build/trino-plugin/trino-ducklake-${PLUGIN_VERSION}:/usr/lib/trino/plugin/ducklake:ro
      # trino_parity DuckDB extension — provides trino_<name> macros + native
      # ICU lower/upper/reverse. Build with:
      #   cd $REPO/duckdb-trino-parity-extension && GEN=ninja make
      # The catalog property ducklake.duckdb.parity-extension-path in
      # ducklake.properties points at the in-container path below.
      - ../../../duckdb-trino-parity-extension/build/release/extension/trino_parity/trino_parity.duckdb_extension:/opt/duckdb-extensions/trino_parity.duckdb_extension:ro
      - ducklake-materialize:/tmp/ducklake-read
    healthcheck:
      test: ["CMD", "/usr/lib/trino/bin/health-check"]
      interval: 5s
      timeout: 5s
      retries: 60
      start_period: 30s

volumes:
  postgres-data:
  minio-data:
  ducklake-materialize:
