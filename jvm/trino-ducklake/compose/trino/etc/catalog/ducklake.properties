connector.name=ducklake

ducklake.catalog.database-url=jdbc:postgresql://postgres:5432/ducklake
ducklake.catalog.database-user=ducklake
ducklake.catalog.database-password=ducklake
ducklake.data-path=s3://ducklake/data/

ducklake.catalog.max-connections=10

# trino_parity DuckDB extension binary, mounted from the host build output.
# When set, the in-process executor LOADs this on every JDBC attach instead
# of replaying the in-tree SQL aliases. Host-side path wired via
# docker-compose.yml; this property names the in-container path.
ducklake.duckdb.parity-extension-path=/opt/duckdb-extensions/trino_parity.duckdb_extension

fs.native-s3.enabled=true
fs.cache.enabled=true
fs.cache.directories=/tmp/trino-cache
fs.cache.max-disk-usage-percentages=80
fs.cache.ttl=1h
s3.endpoint=http://minio:9000
s3.region=us-east-1
s3.aws-access-key=minioadmin
s3.aws-secret-key=minioadmin
s3.path-style-access=true

ducklake.duckdb.memory-limit=512MB
ducklake.duckdb.threads=1
