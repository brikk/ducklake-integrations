connector.name=ducklake

ducklake.catalog.database-url=jdbc:postgresql://postgres:5432/bench_lake
ducklake.catalog.database-user=ducklake
ducklake.catalog.database-password=ducklake
ducklake.data-path=s3://rumble-recsys-outbox/bench_ducklake/
ducklake.catalog.max-connections=10

fs.native-s3.enabled=true
fs.cache.enabled=true
fs.cache.directories=/tmp/trino-cache
fs.cache.max-disk-usage-percentages=80
fs.cache.ttl=1h
s3.endpoint=
s3.region=
s3.aws-access-key=
s3.aws-secret-key=
s3.path-style-access=true

#   SET SESSION ducklake_quack.duckdb_read_mode = 'httpfs';      -- read-cold
#   SET SESSION ducklake_quack.duckdb_read_mode = 'materialize'; -- read-hot
#   SET SESSION ducklake_quack.duckdb_read_mode = 'auto';        -- size-based
ducklake.execution-engine=quack
ducklake.quack.host=duckqk
ducklake.quack.port=9494
ducklake.quack.token=ducklake-engine-token

# Match quack.properties — server-side LOAD path inside the Quack container.
ducklake.duckdb.parity-extension-path=/opt/duckdb-extensions/trino_parity.duckdb_extension
